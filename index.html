<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customs Invoice Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .drop-zone.dragover {
            background: #e3e7ff;
            border-color: #4c5fd7;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .drop-zone h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px 5px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #95afc0;
        }

        .btn-secondary:hover {
            background: #7a93a3;
        }

        .files-list {
            margin-top: 30px;
        }

        .file-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .file-meta {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        .file-actions button {
            padding: 8px 15px;
            margin-left: 5px;
            font-size: 0.9em;
        }

        .results-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .results-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .extracted-data {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .data-row {
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .data-label {
            font-weight: 600;
            color: #667eea;
            display: inline-block;
            width: 200px;
        }

        .data-value {
            color: #2c3e50;
        }

        .commodity-codes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .commodity-card {
            background: white;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #27ae60;
        }

        .commodity-code {
            font-weight: 700;
            color: #27ae60;
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .commodity-desc {
            color: #555;
            font-size: 0.9em;
        }

        .hmrc-section {
            margin-top: 20px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 5px;
            border-left: 4px solid #ffc107;
        }

        .hmrc-status {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s ease;
        }

        .export-options {
            margin-top: 30px;
            padding: 20px;
            background: #d4edda;
            border-radius: 5px;
            border-left: 4px solid #28a745;
        }

        .export-options h4 {
            color: #155724;
            margin-bottom: 15px;
        }

        .status-message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Customs Invoice Tool</h1>
            <p>Extract invoice data from PDF, Word, and Excel documents</p>
        </div>

        <div class="main-content">
            <div id="statusMessage" class="status-message"></div>

            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📄</div>
                <h2>Drop Files Here</h2>
                <p>Support for PDF, Word (.docx), and Excel (.xlsx) files</p>
                <p style="margin-top: 15px; color: #95a5a6;">or</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    Browse Files
                </button>
                <input type="file" id="fileInput" class="file-input" multiple 
                       accept=".pdf,.docx,.xlsx,.xls,.doc">
            </div>

            <div class="files-list" id="filesList"></div>

            <div id="resultsSection" class="results-section">
                <h3>📊 Extracted Data</h3>
                <div id="extractedData" class="extracted-data"></div>

                <h3 style="margin-top: 30px;">🏷️ Commodity Codes</h3>
                <div id="commodityCodes" class="commodity-codes"></div>

                <div class="hmrc-section" id="hmrcSection" style="display: none;">
                    <h4>🔗 HMRC API Integration</h4>
                    <div class="hmrc-status" id="hmrcStatus">Connecting to HMRC...</div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="hmrcProgress"></div>
                    </div>
                </div>

                <div class="export-options">
                    <h4>💾 Export Options</h4>
                    <button class="btn" onclick="exportToExcel()">Export to Excel</button>
                    <button class="btn btn-secondary" onclick="exportToJSON()">Export to JSON</button>
                    <button class="btn btn-secondary" onclick="exportToPDF()">Generate PDF Invoice</button>
                    <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
