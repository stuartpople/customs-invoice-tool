[server]
maxUploadSize = 200
maxMessageSize = 200
enableXsrfProtection = false
enableWebsocketCompression = false
fileWatcherType = "poll"

[runner]
fastReruns = false

[browser]
gatherUsageStats = false

[client]
# Prevent disconnection during long operations
toolbarMode = "minimal"

[theme]
primaryColor = "#00b4d8"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#e8f4fb"
textColor = "#0a1628"
font = "sans serif"
